<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Blog Preview</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Replace with your stylesheet -->
  </head>
  <body>
    <main>
      <card>
        <div class="card__content">
          <img
            src="./assets/images/illustration-article.svg"
            alt="illustration-article"
            class="card__image"
          />
          <span class="card__badge">Learning</span>
          <p class="card__subHeader">Published 21 Dec 2023</p>
          <h2>HTML & CSS foundations</h2>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
          <div class="card__author">
            <img
              src="./assets/images/image-avatar.webp"
              alt="avatar-greg-hooper"
              class="card__author--avatar"
            />
            <span class="card__author--name">Greg Hooper</span>
          </div>
        </div>
      </card>
    </main>

    <footer>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        ><b>Frontend Mentor</b></a>. Coded by <b>Nathaniel</b>
    </footer>
  </body>
</html>
