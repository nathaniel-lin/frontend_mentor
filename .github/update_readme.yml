name: Update Frontend Mentor Progress

on:
  push:
    branches:
      - '*'
  pull_request:
    types:
      - closed
      - opened
      - reopened
      - synchronize
    branches:
      - '*'

jobs:
  update_table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Markdown table generation script
        run: node generate_table.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v6 
        with:
          commit_message: "feat: Update Frontend Mentor progress table"
          file_pattern: 'README.md'